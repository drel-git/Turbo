;     Loot, Sell, Keep, Bank, Tribute, Ignore, #, Destroy
;-------------------------------------------------------------------------------->
;   • Press CTRL+F to find any item or category and change based on your preference
;-------------------------------------------------------------------------------->
; TurboLoot.ini — STARTER TEMPLATE (minimal)
; @version turboloot.ini 3.9.75
; Full sample with many items: "Example TurboLoot.ini" in the same folder/repo.
; Docs: https://github.com/drel-git/TurboLoot  |  /mac TurboLoot help
; ================================================================================
;
[Settings]
; --- Looting ---
lootDistance=80
lootHighValueMinPP=50
lootStackableMinPP=50
inventoryWarnSlots=5
RightClickLoot=ON
; Safety: RightClickLoot=OFF is ignored unless AllowLeftClickLoot=ON.
AllowLeftClickLoot=OFF

; --- Selling ---
SellUnlistedStackable=OFF
sellUnlistedItems=OFF
sellWildcards=OFF
bankWildcards=ON
convertCoinOnBank=ON

; --- Announcements ---
announceDefaultTo=e3bc
announceDoneLootingTo=gsay
announceSkipTo=gsay
announceLoot=ON
announceRunSummary=OFF

; --- Behavior ---
corpseHideMode=LOOTED
lootNoDropPrompt=never
lootNoDropPromptReset=always
dropLevBeforeNav=OFF
returnToLeader=ON
StopLootWhenAttacked=OFF

; --- Debug / logs ---
debug=OFF
logToFile=OFF
logLevel=INFO
lootPerfLog=OFF

; logSkipListForIni — write each skipped item to TurboLoot_skips_log.txt
; Requires a Lua drain to actually write the journal file. Either:
;   - /lua run Turbo                        (Turbo GUI — drains automatically)
;   - /lua run Turbo/skip_journal_daemon    (macro-only users — drains in background)
; Without a drain, skips queue but never reach the journal file.
logSkipListForIni=ON

; ------------------------------------------------------------------------------
; TurboGive: optional [GiveList] — who gets which items / patterns.
; See TurboGive Getting Started.md. Remove this section if you only use TurboLoot.
; ------------------------------------------------------------------------------
[GiveList]
; Exact lines:   Item Exact Name=ReceiverCharName
;                Item Exact Name=ReceiverCharName 5   ; give up to 5 total copies / stack units
; Patterns:      _prefix1=Receiver:Spell:*   _prefix2=Receiver:*Ore
; Shared rules:  _wildcards=CharName|OtherChar   (uses [Wildcards] for matching)
;ExampleItem=YourTankName
;ExamplePotion=YourCleric 5
;_prefix1=YourTank:Spell:*
;_wildcards=YourTank

; Optional: exact item names that never match _prefix or [Wildcards] (exact GiveList lines still assign)
;[GiveExclude]
;_list=Tome of Nife's Mercy,Some Other Item Name

[Wildcards]
; Looting = prefix (starts-with) only. ON/OFF for built-ins; Wildcard1= for customs.
; Keep exactly one [Wildcards] header in this file (duplicates break MQ Ini reads).
; GiveList _prefix can use Text*  *Text  *Text* — see TurboGive docs.
Spell:=ON
Skill:=ON
Song:=ON
Tome =OFF
Tome of =OFF
;Wildcard1=Rune of

[ItemLimits]
; Rules: KEEP, SELL, BANK, TRIBUTE, DESTROY, IGNORE, SKIP, ANNOUNCE, or a number (max count).
; ANNOUNCE leaves the item on corpse and announces it so another character can loot it.
; /mac TurboKey RULE with item on cursor adds a line here.
; /mac TurboLoot help  — full commands

